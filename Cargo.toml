[package]
name = "asmjson"
version = "0.1.0"
edition = "2024"

[features]
stats = []

[dependencies]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
simd-json = { version = "0.17", default-features = false }

[[bench]]
name = "parse"
harness = false

[profile.bench]
debug = 1                  # line tables — enough for perf symbols without bloat
